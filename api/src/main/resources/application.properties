spring.application.name=event_sync
server.port=8080

# PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/event_sync_db
spring.datasource.username=event_sync_user
spring.datasource.password=Event_$ync

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Disable JDBC initialization (important to avoid the error)
spring.sql.init.mode=never
